<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2 class="logo"><i class="bi bi-book"></i> BookStore</h2>
            <br><br>
            <ul>
                <li><i class="bi bi-speedometer2"></i> <a href="#"> Dashboard</a></li>
                <li><i class="bi bi-book"></i><a href="#"> Products</a> </li>
                <li><i class="bi bi-tags"></i> <a href="#"> Categories</a></li>
                <li><i class="bi bi-bag"></i> <a href="#"> Orders</a></li>
                <li><i class="bi bi-people"></i><a href="#"> Users</a></li>
                <li><i class="bi bi-box-arrow-right"></i><a href="#"> Logout</a></li>
            </ul>
        </div>

        <!-- Dashboard Content -->
        <div class="dashboard">
            <div class="topheading">
                <h2>ADMIN DASHBOARD</h2>
            </div>
            <div class="cards">
                <div class="card">
                    <i class="bi bi-people"></i>
                    <h3>TOTAL USERS</h3>
                    <p>0</p>
                </div>
                <div class="card">
                    <i class="bi bi-book"></i>
                    <h3>TOTAL BOOKS</h3>
                    <p>0</p>
                </div>

                <div class="card">
                    <i class="bi bi-cart"></i>
                    <h3>TOTAL ORDERS</h3>
                    <p>0</p>
                </div>

                <div class="card">
                    <i class="bi bi-currency-rupee"></i>
                    <h3>TOTAL REVENUE</h3>
                    <p>₹0</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
